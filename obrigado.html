    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        copper: { 50:'#FDF8F5', 100:'#F5E6DE', 200:'#E8C4B4', 300:'#D4A08B', 400:'#C07B5E', 500:'#A8634A', 600:'#8B4E3A', 700:'#6E3A2A', 800:'#4E261A', 900:'#2E140D' },
                        dark: { 800:'#0D0D0D', 700:'#141414', 600:'#1A1A1A', 500:'#333333' }

                    fontFamily: { sans: ['Inter','system-ui','-apple-system','sans-serif'] }
                }
            }
        }
    </script>
    <style>
        .copper-gradient { background: linear-gradient(135deg, #C07B5E 0%, #D4A08B 50%, #C07B5E 100%); }
        @keyframes checkmark { 0%{transform:scale(0);opacity:0} 50%{transform:scale(1.2)} 100%{transform:scale(1);opacity:1} }
        .checkmark-anim { animation: checkmark .5s ease-out forwards; }
    </style>
</head>
<body class="bg-dark-800 min-h-screen flex items-center justify-center p-4 font-sans antialiased">
    <div class="bg-dark-700 rounded-2xl p-8 max-w-sm w-full shadow-xl border border-dark-600 text-center">
        <div class="checkmark-anim inline-block w-20 h-20 rounded-full bg-green-500/10 ring-4 ring-green-500/20 mb-6 flex items-center justify-center">
            <svg class="w-10 h-10 text-green-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
        </div>
        <!-- Pagamento confirmado -->
        <div id="tela-pago">
            <h1 class="text-2xl font-extrabold text-white mb-2">Pagamento Confirmado!</h1>
            <p class="text-gray-400 text-sm mb-5">Seu acesso ao curso <strong class="text-white">Saia do Vermelho em 30 Dias</strong> foi liberado.</p>
            <div class="bg-dark-800 rounded-xl p-4 mb-4 border border-dark-600">
                <input type="text" id="nome-aluno" placeholder="Seu nome" class="w-full px-3 py-3 bg-dark-700 border border-dark-500 rounded-lg text-sm text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-copper-500/30 transition text-center mb-3">
                <a href="area-membros.html" onclick="salvarNome()" class="block w-full copper-gradient hover:opacity-90 text-white font-extrabold text-base py-3.5 rounded-xl shadow-lg transition-all">🚀 IR PARA ÁREA DE MEMBROS</a>
            </div>
        </div>

        <!-- Pagamento pendente -->
        <div id="tela-pendente" class="hidden">
            <h1 class="text-2xl font-extrabold text-yellow-400 mb-2">⏳ Pagamento Pendente</h1>
            <p class="text-gray-400 text-sm mb-5">Ainda não detectamos seu pagamento. Se já pagou, aguarde alguns instantes ou fale conosco.</p>
            <a href="https://wa.me/5581999733696?text=Ol%C3%A1!%20Meu%20pagamento%20n%C3%A3o%20foi%20confirmado.%20Pode%20verificar%3F" target="_blank" rel="noopener" class="block w-full bg-yellow-500 hover:bg-yellow-600 text-black font-extrabold text-sm py-3 rounded-xl shadow-lg transition-all text-center mb-4">💬 FALAR NO WHATSAPP</a>
            <a href="checkout.html" class="text-sm font-bold text-copper-400 hover:text-copper-300 transition">← Voltar para o checkout</a>
        </div>
    </div>
    <script>
        const params = new URLSearchParams(window.location.search);
        const pagamentoAprovado = params.get('status') === 'approved' || params.get('collection_status') === 'approved';

        if(pagamentoAprovado){
            document.getElementById('tela-pago').classList.remove('hidden');
            document.getElementById('tela-pendente').classList.add('hidden');
            fbq('track', 'Purchase', {content_name: 'Curso Saia do Vermelho', value: 49.99, currency: 'BRL'});
        } else {
            document.getElementById('tela-pago').classList.add('hidden');
            document.getElementById('tela-pendente').classList.remove('hidden');
        }

        function salvarNome(){
            const nome = document.getElementById('nome-aluno').value.trim() || 'Aluno';
            localStorage.setItem('aluno_acesso', 'true');
            localStorage.setItem('aluno_nome', nome);
            localStorage.setItem('aluno_email', nome.toLowerCase().replace(/\s/g,'') + '@aluno.com');
            localStorage.setItem('data_compra', new Date().toLocaleDateString('pt-BR'));
        }
    </script>
</body>
</html>

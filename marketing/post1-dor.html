<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{width:1080px;height:1080px;overflow:hidden;font-family:'Inter','system-ui',sans-serif;background:linear-gradient(135deg,#0D0D0D 0%,#1A1A1A 100%);color:#fff;display:flex;align-items:center;justify-content:center}
        .container{text-align:center;padding:80px;max-width:900px}
        .emoji{font-size:120px;margin-bottom:40px;display:block}
        h1{font-size:72px;font-weight:900;line-height:1.1;margin-bottom:30px}
        h1 span{color:#EF4444}
        p{font-size:36px;color:#999;line-height:1.5;margin-bottom:20px}
        .stat{display:inline-block;background:rgba(192,123,94,0.15);border:2px solid rgba(192,123,94,0.3);padding:20px 40px;border-radius:20px;margin-top:20px}
        .stat p{font-size:28px;color:#C07B5E;margin:0}
        .stat strong{font-size:52px;color:#D4A08B;display:block}
        .logo{position:absolute;top:50px;left:50%;transform:translateX(-50%);font-size:28px;color:#C07B5E;font-weight:700}
    </style>
</head>
<body>
    <span class="logo">💰 Saia do Vermelho</span>
    <div class="container">
        <span class="emoji">😰</span>
        <h1>Seu dinheiro <span>some</span><br>antes do fim do mês?</h1>
        <p>70% dos brasileiros não sabem para onde vai o próprio dinheiro.</p>
        <p>O problema não é quanto você ganha — é que ninguém te ensinou.</p>
        <div class="stat">
            <strong>+800</strong><p>alunos já transformaram suas finanças</p>
        </div>
    </div>
</body>
</html>

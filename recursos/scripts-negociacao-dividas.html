<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scripts Negociação Dívidas | Saia do Vermelho</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <script>tailwind.config={theme:{extend:{colors:{copper:{50:'#FDF8F5',100:'#F5E6DE',200:'#E8C4B4',300:'#D4A08B',400:'#C07B5E',500:'#A8634A',600:'#8B4E3A',700:'#6E3A2A',800:'#4E261A',900:'#2E140D'},dark:{800:'#0D0D0D',700:'#141414',600:'#1A1A1A',500:'#333333',400:'#666666'}},fontFamily:{sans:['Inter','system-ui','sans-serif']}}}}</script>
    <style>.copper-gradient{background:linear-gradient(135deg,#C07B5E,#D4A08B,#C07B5E)}@media print{body{background:#0D0D0D!important}.no-print{display:none!important}}</style>
</head>
<body class="bg-dark-800 text-gray-300 font-sans antialiased">
<div class="max-w-2xl mx-auto p-4">
<div class="copper-gradient text-white rounded-2xl p-6 mb-6 text-center no-print shadow-lg"><h1 class="text-2xl font-extrabold mb-1">📋 5 Scripts para Negociar Dívidas</h1><p class="text-white/80 text-sm">Consiga até 90% de desconto em cada canal</p><button onclick="window.print()" class="mt-4 bg-white text-copper-600 font-bold px-5 py-2 rounded-xl hover:bg-copper-50 transition text-sm">🖨️ Imprimir</button></div>

<div class="bg-dark-700 rounded-2xl p-6 border border-dark-600">
    <div class="bg-copper-500/10 rounded-2xl p-5 mb-8 border border-copper-500/20 no-print"><h2 class="text-lg font-extrabold text-white mb-4">🧮 Calculadora de Negociação</h2>
        <div class="grid grid-cols-2 gap-3 mb-3"><div><label class="text-xs font-semibold text-gray-400">Valor da dívida (R$)</label><input type="number" id="calc-divida" value="1000" class="w-full mt-1 px-3 py-2.5 bg-dark-800 border border-dark-600 rounded-lg text-sm text-white focus:outline-none focus:ring-2 focus:ring-copper-500/30"></div><div><label class="text-xs font-semibold text-gray-400">Valor negociado (R$)</label><input type="number" id="calc-negociado" value="150" class="w-full mt-1 px-3 py-2.5 bg-dark-800 border border-dark-600 rounded-lg text-sm text-white focus:outline-none focus:ring-2 focus:ring-copper-500/30"></div></div>
        <button onclick="calcularDesconto()" class="w-full copper-gradient hover:opacity-90 text-white font-bold py-2.5 rounded-xl text-sm transition shadow-lg">CALCULAR ECONOMIA</button><div id="resultado-desconto" class="mt-4 hidden text-center"></div>
    </div>

    <div class="mb-8"><h2 class="text-lg font-extrabold text-white mb-4">📊 Antes vs Depois</h2><canvas id="chartNegociacao" height="260"></canvas></div>

    <div class="bg-red-500/10 border-l-4 border-red-500 p-4 rounded-r-lg mb-6"><p class="font-bold text-red-400 text-sm">⚠️ LEIA ANTES</p><p class="text-red-400/70 text-xs">Nunca aceite a primeira oferta. Bancos já consideraram sua dívida como perda.</p></div>
    <div id="scripts-container"></div>
</div></div>

<script>
const scripts=[{titulo:'SCRIPT 1: WhatsApp — Cartão de Crédito',icone:'📱',quando:'Quando o banco entrar em contato oferecendo acordo.',texto:`Olá, boa tarde!\n\nRecebi uma oferta de negociação da minha dívida do cartão [BANCO].\n\nMeu débito atual é de aproximadamente R$ [VALOR].\n\nQuero muito quitar, mas no momento só tenho R$ [10-20% DO TOTAL] disponível.\n\nExiste a possibilidade de fecharmos nesse valor à vista? Ou qual a melhor oferta?\n\nFico no aguardo. Obrigado(a)!`,porque:'A dívida já foi vendida para cobrança por centavos. O banco aceita 10-20%.'},{titulo:'SCRIPT 2: Telefone — Empréstimo',icone:'📞',quando:'Para negociar empréstimo ou cheque especial pelo telefone.',texto:`— Alô, boa tarde. Meu nome é [SEU NOME], CPF [XXX].\n— Quero negociar uma dívida com [BANCO].\n— Hoje consigo pagar R$ [VALOR] à vista.\n— Qual o valor máximo de desconto para pagamento à vista?\n— [Após resposta] Consegue consultar se há campanha especial, como feirão limpa nome?`,porque:'Perguntar por "campanha" aciona oferta especial no sistema.'},{titulo:'SCRIPT 3: E-mail — Formal',icone:'📧',quando:'Para dívidas antigas (2+ anos).',texto:`Assunto: Proposta de Quitação — [SEU NOME] — CPF [XXX]\n\nPrezados,\n\nIdentifiquei um débito referente ao contrato [NÚMERO].\n\nValor original: R$ [VALOR]. Considerando o tempo decorrido, proponho pagamento à vista de R$ [5-15%] para quitação total e baixa definitiva nos órgãos de proteção ao crédito.\n\nAguardo retorno em 5 dias úteis.\n\nAtenciosamente,\n[SEU NOME]`,porque:'E-mail documenta tudo. Dívidas com 2+ anos já prescreveram do SCR.'},{titulo:'SCRIPT 4: Presencial — Agência',icone:'🏦',quando:'Para resolver cara a cara, especialmente onde já tem conta.',texto:`"Bom dia. Meu nome é [SEU NOME], sou correntista aqui.\n\nTenho uma dívida de [TIPO] de R$ [VALOR]. Hoje eu tenho R$ [VALOR À VISTA] e quero quitar isso agora.\n\nPrefiro resolver aqui do que ter que ir no Procon ou Banco Central. O que você consegue fazer por mim?"\n\n[Se disser que não pode:]\n"Tudo bem. Você pode chamar o gerente? Sei que ele tem alçada para aprovar esse tipo de acordo."`,porque:'Mencionar Procon e BC mostra que você conhece seus direitos. Gerentes têm autonomia.'},{titulo:'SCRIPT 5: Chat do App',icone:'💬',quando:'Use o chat oficial dentro do app do banco.',texto:`"Olá, gostaria de negociar minha dívida do cartão.\n\nValor atual: R$ [VALOR]\nTenho R$ [VALOR À VISTA] disponível hoje.\n\nQual a melhor oferta para pagamento à vista?\n\nObs: já consultei o Serasa e há ofertas de outros bancos com 90% de desconto."`,porque:'Chat do app registra tudo. Mencionar Serasa mostra que você pesquisou.'}];

document.getElementById('scripts-container').innerHTML=scripts.map((s,i)=>`<div class="border-2 border-dark-500 rounded-2xl p-5 mb-5 hover:border-copper-500/30 transition"><div class="flex items-center gap-2 mb-3"><span class="text-2xl">${s.icone}</span><h2 class="text-lg font-extrabold text-white">${s.titulo}</h2></div><p class="text-xs font-bold text-copper-400 mb-2">📋 Quando usar:</p><p class="text-xs text-gray-400 mb-3">${s.quando}</p><p class="text-xs font-bold text-copper-400 mb-2">📋 O que dizer:</p><div class="bg-dark-800 rounded-xl p-4 text-sm text-gray-300 italic leading-relaxed whitespace-pre-line border border-dark-600">${s.texto}</div><div class="mt-3"><button onclick="copiar(this,\`${s.texto.replace(/`/g,'\\`')}\`)" class="text-xs font-bold text-copper-400 hover:text-copper-300 bg-copper-500/10 hover:bg-copper-500/20 px-3 py-1.5 rounded-lg transition">📋 Copiar script</button></div><div class="mt-3 bg-copper-500/10 rounded-lg p-3 text-xs"><span class="font-bold text-copper-400">🔑 Por que funciona:</span><span class="text-gray-400"> ${s.porque}</span></div></div>`).join('');

function copiar(btn,texto){navigator.clipboard.writeText(texto).then(()=>{btn.textContent='✅ Copiado!';setTimeout(()=>btn.textContent='📋 Copiar script',2000)}).catch(()=>alert('Selecione o texto manualmente.'))}
function calcularDesconto(){const d=parseFloat(document.getElementById('calc-divida').value)||0;const n=parseFloat(document.getElementById('calc-negociado').value)||0;const e=d-n;const pct=d>0?((e/d)*100).toFixed(0):0;document.getElementById('resultado-desconto').innerHTML=`<div class="grid grid-cols-3 gap-2 text-center"><div class="bg-dark-800 rounded-lg p-2 border border-dark-600"><p class="text-xs text-gray-400">Dívida</p><p class="font-extrabold text-red-400">R$ ${d.toFixed(0)}</p></div><div class="bg-dark-800 rounded-lg p-2 border border-dark-600"><p class="text-xs text-gray-400">Negociado</p><p class="font-extrabold text-green-400">R$ ${n.toFixed(0)}</p></div><div class="bg-dark-800 rounded-lg p-2 border border-copper-500/20"><p class="text-xs text-gray-400">Economia</p><p class="font-extrabold text-copper-400">${pct}%</p></div></div><p class="text-xs text-gray-400 mt-2">Você economizou <strong class="text-green-400">R$ ${e.toFixed(0)}</strong>!</p>`;document.getElementById('resultado-desconto').classList.remove('hidden')}

new Chart(document.getElementById('chartNegociacao'),{type:'bar',data:{labels:['Cartão','Cheque Esp.','Empréstimo','Água/Luz','Multa'],datasets:[{label:'Original',data:[2000,1500,5000,800,300],backgroundColor:'#EF4444',borderRadius:6},{label:'Negociado',data:[200,180,500,400,150],backgroundColor:'#C07B5E',borderRadius:6}]},options:{responsive:true,plugins:{legend:{position:'bottom',labels:{font:{family:'Inter',size:11},padding:14,color:'#999',usePointStyle:true}}},scales:{y:{ticks:{callback:v=>'R$ '+v,font:{family:'Inter'},color:'#999'},grid:{color:'#333'}},x:{ticks:{font:{family:'Inter',size:10},color:'#999'}}}}});
</script>
</body>
</html>

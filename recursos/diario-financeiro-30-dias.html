<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diário Financeiro 30 Dias | Saia do Vermelho</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <script>tailwind.config={theme:{extend:{colors:{copper:{50:'#FDF8F5',100:'#F5E6DE',200:'#E8C4B4',300:'#D4A08B',400:'#C07B5E',500:'#A8634A',600:'#8B4E3A',700:'#6E3A2A',800:'#4E261A',900:'#2E140D'},dark:{800:'#0D0D0D',700:'#141414',600:'#1A1A1A',500:'#333333',400:'#666666'}},fontFamily:{sans:['Inter','system-ui','sans-serif']}}}}</script>
    <style>.copper-gradient{background:linear-gradient(135deg,#C07B5E,#D4A08B,#C07B5E)}@media print{body{background:#0D0D0D!important}.no-print{display:none!important}}</style>
</head>
<body class="bg-dark-800 text-gray-300 font-sans antialiased">
<div class="max-w-2xl mx-auto p-4">
<div class="copper-gradient text-white rounded-2xl p-6 mb-6 text-center no-print shadow-lg"><h1 class="text-2xl font-extrabold mb-1">📊 Diário Financeiro de 30 Dias</h1><p class="text-white/80 text-sm">Mapeie cada centavo que entra e sai</p><button onclick="window.print()" class="mt-4 bg-white text-copper-600 font-bold px-5 py-2 rounded-xl hover:bg-copper-50 transition text-sm">🖨️ Imprimir</button></div>

<div class="bg-dark-700 rounded-2xl p-6 border border-dark-600">
    <div class="bg-copper-500/10 rounded-2xl p-5 mb-8 border border-copper-500/20 no-print"><h2 class="text-lg font-extrabold text-white mb-4">🧮 Calculadora de Lançamentos</h2>
        <div class="grid grid-cols-2 gap-3 mb-4">
            <div><label class="text-xs font-semibold text-gray-400">Data</label><input type="date" id="lct-data" class="w-full mt-1 px-3 py-2.5 bg-dark-800 border border-dark-600 rounded-lg text-sm text-white focus:outline-none focus:ring-2 focus:ring-copper-500/30"></div>
            <div><label class="text-xs font-semibold text-gray-400">Tipo</label><select id="lct-tipo" class="w-full mt-1 px-3 py-2.5 bg-dark-800 border border-dark-600 rounded-lg text-sm text-white focus:outline-none focus:ring-2 focus:ring-copper-500/30"><option value="entrada">💰 Entrada</option><option value="saida">💸 Saída</option></select></div>
            <div class="col-span-2"><label class="text-xs font-semibold text-gray-400">Descrição</label><input type="text" id="lct-desc" placeholder="Salário, Café, Conta de luz..." class="w-full mt-1 px-3 py-2.5 bg-dark-800 border border-dark-600 rounded-lg text-sm text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-copper-500/30"></div>
            <div><label class="text-xs font-semibold text-gray-400">Valor (R$)</label><input type="number" id="lct-valor" placeholder="0,00" step="0.01" class="w-full mt-1 px-3 py-2.5 bg-dark-800 border border-dark-600 rounded-lg text-sm text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-copper-500/30"></div>
            <div><label class="text-xs font-semibold text-gray-400">Categoria</label><select id="lct-cat" class="w-full mt-1 px-3 py-2.5 bg-dark-800 border border-dark-600 rounded-lg text-sm text-white focus:outline-none focus:ring-2 focus:ring-copper-500/30"><option value="E">E - Essencial</option><option value="Q">Q - Quero</option><option value="S">S - Supérfluo</option></select></div>
        </div>
        <button onclick="adicionarLancamento()" class="w-full copper-gradient hover:opacity-90 text-white font-bold py-3 rounded-xl text-sm transition shadow-lg mb-3">+ ADICIONAR</button>
        <div id="resumo-calc" class="grid grid-cols-3 gap-2 text-center text-xs"><div class="bg-dark-800 rounded-lg p-2 border border-dark-600"><p class="text-gray-400">Entradas</p><p id="total-entradas" class="font-extrabold text-green-400 text-base">R$ 0</p></div><div class="bg-dark-800 rounded-lg p-2 border border-dark-600"><p class="text-gray-400">Saídas</p><p id="total-saidas" class="font-extrabold text-red-400 text-base">R$ 0</p></div><div class="bg-dark-800 rounded-lg p-2 border border-dark-600"><p class="text-gray-400">Saldo</p><p id="total-saldo" class="font-extrabold text-base">R$ 0</p></div></div>
        <div id="lista-lancamentos" class="mt-4 space-y-1 max-h-60 overflow-y-auto"></div>
        <button onclick="limparLancamentos()" id="btn-limpar" class="hidden mt-3 text-xs text-red-400 hover:text-red-300 underline mx-auto block">Limpar todos</button>
    </div>

    <div class="mb-8"><h2 class="text-lg font-extrabold text-white mb-4">📊 Entradas vs Saídas por Semana</h2><canvas id="chartBarras" height="280"></canvas></div>

    <h2 class="text-lg font-extrabold text-white mb-4">🗓️ Tabela Semanal</h2>
    <p class="text-xs text-gray-400 mb-4">Anote assim: <code class="bg-dark-600 px-1 py-0.5 rounded text-copper-400">15/05 | +R$ 1.320 | Salário | E</code></p>
    <div class="overflow-x-auto"><table class="w-full text-xs border-collapse mb-6" id="tabela-semanal"></table></div>
</div></div>

<script>
let lancamentos=JSON.parse(localStorage.getItem('df_lancamentos')||'[]');let chartBarras;
(function renderTabela(){const dias=['Seg','Ter','Qua','Qui','Sex','Sáb','Dom'];let h='<thead><tr class="bg-dark-600"><th class="border border-dark-500 p-2 text-left text-xs text-gray-400">Dia</th><th class="border border-dark-500 p-2 text-left text-xs text-gray-400">Data</th><th class="border border-dark-500 p-2 text-left text-xs text-gray-400">Descrição</th><th class="border border-dark-500 p-2 text-right text-xs text-gray-400">Entrada</th><th class="border border-dark-500 p-2 text-right text-xs text-gray-400">Saída</th><th class="border border-dark-500 p-2 text-center text-xs text-gray-400">Tipo</th></tr></thead><tbody>';for(let s=1;s<=4;s++){h+=`<tr><td class="border border-dark-500 p-2 font-bold text-copper-400 bg-copper-500/10" colspan="6">SEMANA ${s}</td></tr>`;dias.forEach(d=>{h+=`<tr><td class="border border-dark-500 p-2 text-gray-300">${d}</td><td class="border border-dark-500 p-2"></td><td class="border border-dark-500 p-2"></td><td class="border border-dark-500 p-2 text-right"></td><td class="border border-dark-500 p-2 text-right"></td><td class="border border-dark-500 p-2 text-center"></td></tr>`});h+=`<tr class="bg-copper-500/5 font-bold"><td class="border border-dark-500 p-2" colspan="3">TOTAL</td><td class="border border-dark-500 p-2 text-right"></td><td class="border border-dark-500 p-2 text-right"></td><td class="border border-dark-500 p-2 text-right">Saldo:</td></tr>`}h+='</tbody>';document.getElementById('tabela-semanal').innerHTML=h})();

function adicionarLancamento(){const data=document.getElementById('lct-data').value||new Date().toISOString().split('T')[0];const tipo=document.getElementById('lct-tipo').value;const desc=document.getElementById('lct-desc').value.trim()||'Sem descrição';const valor=parseFloat(document.getElementById('lct-valor').value)||0;const cat=document.getElementById('lct-cat').value;if(valor<=0)return alert('Informe um valor maior que zero.');lancamentos.push({data,tipo,desc,valor,cat});localStorage.setItem('df_lancamentos',JSON.stringify(lancamentos));['lct-data','lct-desc','lct-valor'].forEach(id=>document.getElementById(id).value='');atualizarResumo()}
function limparLancamentos(){if(confirm('Limpar todos?')){lancamentos=[];localStorage.setItem('df_lancamentos','[]');atualizarResumo()}}

function atualizarResumo(){const entradas=lancamentos.filter(l=>l.tipo==='entrada').reduce((s,l)=>s+l.valor,0);const saidas=lancamentos.filter(l=>l.tipo==='saida').reduce((s,l)=>s+l.valor,0);const saldo=entradas-saidas;document.getElementById('total-entradas').textContent='R$ '+entradas.toFixed(2);document.getElementById('total-saidas').textContent='R$ '+saidas.toFixed(2);const s=document.getElementById('total-saldo');s.textContent='R$ '+saldo.toFixed(2);s.className='font-extrabold text-base '+(saldo>=0?'text-green-400':'text-red-400');
document.getElementById('lista-lancamentos').innerHTML=lancamentos.slice(-20).reverse().map(l=>`<div class="flex justify-between items-center text-xs p-2 rounded-lg ${l.tipo==='entrada'?'bg-green-500/10':'bg-red-500/10'}"><span class="text-gray-400">${l.data} — ${l.desc} <span class="text-gray-500">[${l.cat}]</span></span><span class="font-bold ${l.tipo==='entrada'?'text-green-400':'text-red-400'}">${l.tipo==='entrada'?'+':'-'} R$ ${l.valor.toFixed(2)}</span></div>`).join('');
document.getElementById('btn-limpar').classList.toggle('hidden',lancamentos.length===0);atualizarGrafico()}

function atualizarGrafico(){const sem={entradas:[0,0,0,0],saidas:[0,0,0,0]};lancamentos.forEach(l=>{const d=new Date(l.data+'T00:00:00');const sem=Math.min(3,Math.floor((d.getDate()-1)/7));if(l.tipo==='entrada')sem.entradas[sem]+=l.valor;else sem.saidas[sem]+=l.valor});if(chartBarras)chartBarras.destroy();chartBarras=new Chart(document.getElementById('chartBarras'),{type:'bar',data:{labels:['Sem 1','Sem 2','Sem 3','Sem 4'],datasets:[{label:'Entradas',data:sem.entradas,backgroundColor:'#C07B5E',borderRadius:6},{label:'Saídas',data:sem.saidas,backgroundColor:'#EF4444',borderRadius:6}]},options:{responsive:true,plugins:{legend:{position:'bottom',labels:{font:{family:'Inter',size:11},padding:14,color:'#999',usePointStyle:true}}},scales:{y:{ticks:{callback:v=>'R$ '+v,font:{family:'Inter'},color:'#999'},grid:{color:'#333'}},x:{ticks:{font:{family:'Inter'},color:'#999'}}}}})}
atualizarResumo();
</script>
</body>
</html>

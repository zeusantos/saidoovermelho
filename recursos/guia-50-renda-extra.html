<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>50 Ideias Renda Extra | Saia do Vermelho</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <script>tailwind.config={theme:{extend:{colors:{copper:{50:'#FDF8F5',100:'#F5E6DE',200:'#E8C4B4',300:'#D4A08B',400:'#C07B5E',500:'#A8634A',600:'#8B4E3A',700:'#6E3A2A',800:'#4E261A',900:'#2E140D'},dark:{800:'#0D0D0D',700:'#141414',600:'#1A1A1A',500:'#333333',400:'#666666'}},fontFamily:{sans:['Inter','system-ui','sans-serif']}}}}</script>
    <style>.copper-gradient{background:linear-gradient(135deg,#C07B5E,#D4A08B,#C07B5E)}@media print{body{background:#0D0D0D!important}.no-print{display:none!important}}</style>
</head>
<body class="bg-dark-800 text-gray-300 font-sans antialiased">
<div class="max-w-2xl mx-auto p-4">
<div class="copper-gradient text-white rounded-2xl p-6 mb-6 text-center no-print shadow-lg"><h1 class="text-2xl font-extrabold mb-1">💡 50 Ideias de Renda Extra</h1><p class="text-white/80 text-sm">Só com o celular — potencial de R$ 100 a R$ 2.000/mês</p><button onclick="window.print()" class="mt-4 bg-white text-copper-600 font-bold px-5 py-2 rounded-xl hover:bg-copper-50 transition text-sm">🖨️ Imprimir</button></div>

<div class="bg-dark-700 rounded-2xl p-6 border border-dark-600">
    <div class="bg-copper-500/10 rounded-2xl p-5 mb-8 border border-copper-500/20 no-print"><h2 class="text-lg font-extrabold text-white mb-4">🧮 Quanto Posso Ganhar?</h2>
        <div class="grid grid-cols-2 gap-3 mb-3"><div><label class="text-xs font-semibold text-gray-400">Horas/dia</label><input type="number" id="calc-horas" value="2" min="0.5" max="8" step="0.5" class="w-full mt-1 px-3 py-2.5 bg-dark-800 border border-dark-600 rounded-lg text-sm text-white focus:outline-none focus:ring-2 focus:ring-copper-500/30"></div><div><label class="text-xs font-semibold text-gray-400">Dias/semana</label><input type="number" id="calc-dias" value="5" min="1" max="7" class="w-full mt-1 px-3 py-2.5 bg-dark-800 border border-dark-600 rounded-lg text-sm text-white focus:outline-none focus:ring-2 focus:ring-copper-500/30"></div><div class="col-span-2"><label class="text-xs font-semibold text-gray-400">Valor/hora (R$)</label><input type="number" id="calc-valor-hora" value="15" min="5" max="100" class="w-full mt-1 px-3 py-2.5 bg-dark-800 border border-dark-600 rounded-lg text-sm text-white focus:outline-none focus:ring-2 focus:ring-copper-500/30"></div></div>
        <div id="calc-resultado" class="text-center mt-3"></div>
        <button onclick="calcularRenda()" class="w-full copper-gradient hover:opacity-90 text-white font-bold py-2.5 rounded-xl text-sm transition shadow-lg mt-2">CALCULAR</button>
    </div>

    <div class="flex flex-wrap gap-2 mb-6 no-print" id="filtros"></div>
    <div class="mb-8"><h2 class="text-lg font-extrabold text-white mb-4">🏆 Top 10 por Potencial</h2><canvas id="chartRanking" height="320"></canvas></div>
    <div id="ideias-container"></div>
</div></div>

<script>
const categorias=[{id:'comida',nome:'🍳 Comida'},{id:'servicos',nome:'🔧 Serviços'},{id:'digital',nome:'📱 Digital'},{id:'vendas',nome:'🛍️ Vendas'},{id:'criativo',nome:'🎨 Criativo'}];
const ideias=[{cat:'comida',titulo:'Marmitas fitness',desc:'Cozinhe 10 no domingo, venda no trabalho.',potencial:'300-500'},{cat:'comida',titulo:'Bolos de pote',desc:'Ingrediente barato. R$ 5-8 cada.',potencial:'200-400'},{cat:'comida',titulo:'Brigadeiro gourmet',desc:'Venda no Instagram do bairro.',potencial:'150-300'},{cat:'comida',titulo:'Salgados para festa',desc:'Coxinha, empada, bolinha de queijo.',potencial:'300-800'},{cat:'comida',titulo:'Doces caseiros',desc:'Pé de moleque, paçoca, cocada.',potencial:'100-300'},{cat:'comida',titulo:'Pão caseiro recheado',desc:'Pão de queijo, pão de batata.',potencial:'150-350'},{cat:'comida',titulo:'Geleia artesanal',desc:'Goiaba, morango, pimenta.',potencial:'100-250'},{cat:'comida',titulo:'Tempero caseiro',desc:'Alho, cebola, sal de ervas.',potencial:'100-200'},{cat:'servicos',titulo:'Faxina / Diarista',desc:'R$ 100-150 por faxina.',potencial:'400-800'},{cat:'servicos',titulo:'Cuidador(a) de idosos',desc:'Curso grátis no YouTube.',potencial:'800-2000'},{cat:'servicos',titulo:'Babá por hora',desc:'Divulgue no grupo do bairro.',potencial:'200-600'},{cat:'servicos',titulo:'Passeador de cachorro',desc:'3 dogs × R$ 15 × 20 dias.',potencial:'300-600'},{cat:'servicos',titulo:'Lavar carros no bairro',desc:'R$ 30-50 por carro.',potencial:'300-600'},{cat:'servicos',titulo:'Montador de móveis',desc:'Muita gente compra e não monta.',potencial:'300-800'},{cat:'servicos',titulo:'Pintor(a) de parede',desc:'Curso rápido no YouTube.',potencial:'500-1500'},{cat:'servicos',titulo:'Eletricista básico',desc:'Chuveiro, tomada, torneira.',potencial:'400-1000'},{cat:'servicos',titulo:'Costureiro(a) de ajustes',desc:'Barra, apertar roupa, zíper.',potencial:'300-700'},{cat:'servicos',titulo:'Personal organizer',desc:'Organizar armários e despensas.',potencial:'300-600'},{cat:'digital',titulo:'Vender fotos online',desc:'Shutterstock, Adobe Stock.',potencial:'100-500'},{cat:'digital',titulo:'Avaliar apps e sites',desc:'UserTesting, Appen.',potencial:'100-300'},{cat:'digital',titulo:'Digitação de documentos',desc:'Plataformas de freelance.',potencial:'200-500'},{cat:'digital',titulo:'Tradução simples',desc:'Inglês/português.',potencial:'300-800'},{cat:'digital',titulo:'Gestão de redes sociais',desc:'Ajude negócios locais.',potencial:'300-1000'},{cat:'digital',titulo:'Criação de planilhas',desc:'Google Sheets, Excel.',potencial:'200-600'},{cat:'digital',titulo:'Edição de vídeo simples',desc:'CapCut, InShot no celular.',potencial:'200-700'},{cat:'digital',titulo:'Atendimento WhatsApp',desc:'Empresas contratam remoto.',potencial:'400-1200'},{cat:'digital',titulo:'Vender no Mercado Livre',desc:'Comece com itens de casa.',potencial:'200-1000'},{cat:'digital',titulo:'Criar e vender eBooks',desc:'Sobre o que você domina.',potencial:'100-500'},{cat:'digital',titulo:'Pesquisas remuneradas',desc:'Google Opinion Rewards.',potencial:'50-150'},{cat:'digital',titulo:'Aulas particulares online',desc:'Idiomas, reforço, música.',potencial:'200-800'},{cat:'vendas',titulo:'Revender roupas em brechó',desc:'Instagram do bairro.',potencial:'300-1000'},{cat:'vendas',titulo:'Feira do bairro',desc:'Frutas, legumes, temperos.',potencial:'200-600'},{cat:'vendas',titulo:'Conserto de sapatos',desc:'Curso rápido, ferramenta barata.',potencial:'200-500'},{cat:'vendas',titulo:'Produtos de limpeza caseiros',desc:'Sabão, detergente, amaciante.',potencial:'150-400'},{cat:'vendas',titulo:'Velas aromáticas',desc:'Parafina + essência + pote bonito.',potencial:'150-350'},{cat:'vendas',titulo:'Bijuterias artesanais',desc:'Miçangas, cordão, fechos.',potencial:'100-300'},{cat:'vendas',titulo:'Canecas personalizadas',desc:'Sublimação ou caneta permanente.',potencial:'200-500'},{cat:'vendas',titulo:'Itens de bebê usados',desc:'Roupas e brinquedos.',potencial:'100-400'},{cat:'vendas',titulo:'Móveis restaurados',desc:'Compre velho, pinte, revenda.',potencial:'300-1000'},{cat:'vendas',titulo:'Kits de presente',desc:'Chocolate + caneca + cartão.',potencial:'200-500'},{cat:'criativo',titulo:'Artesanato em crochê',desc:'Sousplat, amigurumi.',potencial:'200-600'},{cat:'criativo',titulo:'Lettering / quadros',desc:'Frases decorativas.',potencial:'150-400'},{cat:'criativo',titulo:'Fotografia de eventos',desc:'Aniversários, batizados.',potencial:'300-1000'},{cat:'criativo',titulo:'Decoração de festas',desc:'Balões, painel, mesa.',potencial:'400-1500'},{cat:'criativo',titulo:'Maquiagem para eventos',desc:'Formaturas, casamentos.',potencial:'300-800'},{cat:'criativo',titulo:'Unhas decoradas em casa',desc:'Alongamento, nail art.',potencial:'300-700'},{cat:'criativo',titulo:'Aulas de culinária',desc:'Ensine sua especialidade.',potencial:'200-600'},{cat:'criativo',titulo:'Música em eventos',desc:'Voz e violão em bares.',potencial:'300-1000'},{cat:'criativo',titulo:'Jardinagem / paisagismo',desc:'Plantas, poda, manutenção.',potencial:'300-800'},{cat:'criativo',titulo:'Aulas de artesanato',desc:'Ensine o que você sabe.',potencial:'200-500'}];

document.getElementById('filtros').innerHTML=`<button onclick="filtrar('todas')" class="px-3 py-1.5 rounded-full text-xs font-bold bg-copper-500 text-white">Todas</button>`+categorias.map(c=>`<button onclick="filtrar('${c.id}')" class="px-3 py-1.5 rounded-full text-xs font-bold bg-dark-600 border border-dark-500 text-gray-400 hover:border-copper-500/30 hover:text-copper-400 transition">${c.nome}</button>`).join('');

function filtrar(cat){document.querySelectorAll('#filtros button').forEach(b=>{b.classList.remove('bg-copper-500','text-white');b.classList.add('bg-dark-600','border','border-dark-500','text-gray-400')});event.target.classList.add('bg-copper-500','text-white');event.target.classList.remove('bg-dark-600','border','border-dark-500','text-gray-400');document.querySelectorAll('.ideia-card').forEach(el=>{el.style.display=(cat==='todas'||el.dataset.cat===cat)?'':'none'})}

const ic=document.getElementById('ideias-container');let ca='';
ideias.forEach((i,idx)=>{if(i.cat!==ca){ca=i.cat;const ci=categorias.find(c=>c.id===ca);ic.innerHTML+=`<div class="mb-6"><h2 class="text-base font-extrabold text-white mb-3">${ci.nome}</h2><div class="space-y-2"></div></div>`}const d=ic.querySelectorAll('.space-y-2');d[d.length-1].innerHTML+=`<div class="ideia-card p-3 rounded-xl bg-copper-500/5 border border-transparent hover:border-copper-500/20 transition" data-cat="${i.cat}"><div class="flex justify-between items-start"><div><span class="font-bold text-white text-sm">${idx+1}. ${i.titulo}</span><p class="text-xs text-gray-400 mt-0.5">${i.desc}</p></div><span class="text-xs font-bold text-copper-400 bg-copper-500/10 px-2 py-0.5 rounded-full flex-shrink-0 ml-2">R$ ${i.potencial}/mês</span></div></div>`});

function calcularRenda(){const h=parseFloat(document.getElementById('calc-horas').value)||0;const d=parseInt(document.getElementById('calc-dias').value)||0;const v=parseFloat(document.getElementById('calc-valor-hora').value)||0;const s=h*d*v;const m=s*4;document.getElementById('calc-resultado').innerHTML=`<div class="grid grid-cols-2 gap-3"><div class="bg-dark-800 rounded-lg p-3 border border-dark-600"><p class="text-xs text-gray-400">Por semana</p><p class="text-xl font-extrabold text-copper-400">R$ ${s.toFixed(0)}</p></div><div class="bg-dark-800 rounded-lg p-3 border border-dark-600"><p class="text-xs text-gray-400">Por mês</p><p class="text-xl font-extrabold text-green-400">R$ ${m.toFixed(0)}</p></div></div>`}
calcularRenda();

const top10=ideias.sort((a,b)=>parseInt(b.potencial.split('-').pop())-parseInt(a.potencial.split('-').pop())).slice(0,10);
new Chart(document.getElementById('chartRanking'),{type:'bar',data:{labels:top10.map(i=>i.titulo.length>18?i.titulo.slice(0,18)+'...':i.titulo),datasets:[{label:'Máximo R$/mês',data:top10.map(i=>parseInt(i.potencial.split('-').pop())),backgroundColor:['#C07B5E','#C07B5E','#C07B5E','#D4A08B','#D4A08B','#D4A08B','#D4A08B','#E8C4B4','#E8C4B4','#E8C4B4'],borderRadius:6}]},options:{indexAxis:'y',responsive:true,plugins:{legend:{display:false}},scales:{x:{ticks:{callback:v=>'R$ '+v,font:{family:'Inter'},color:'#999'},grid:{color:'#333'}},y:{ticks:{font:{family:'Inter',size:10},color:'#999'}}}}});
</script>
</body>
</html>

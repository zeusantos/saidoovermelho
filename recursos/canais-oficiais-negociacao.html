<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canais Negociação por Banco | Saia do Vermelho</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config={theme:{extend:{colors:{copper:{50:'#FDF8F5',100:'#F5E6DE',200:'#E8C4B4',300:'#D4A08B',400:'#C07B5E',500:'#A8634A',600:'#8B4E3A',700:'#6E3A2A',800:'#4E261A',900:'#2E140D'},dark:{800:'#0D0D0D',700:'#141414',600:'#1A1A1A',500:'#333333',400:'#666666'}},fontFamily:{sans:['Inter','system-ui','sans-serif']}}}}</script>
    <style>.copper-gradient{background:linear-gradient(135deg,#C07B5E,#D4A08B,#C07B5E)}@media print{body{background:#0D0D0D!important}.no-print{display:none!important}}</style>
</head>
<body class="bg-dark-800 text-gray-300 font-sans antialiased">
<div class="max-w-2xl mx-auto p-4">
<div class="copper-gradient text-white rounded-2xl p-6 mb-6 text-center no-print shadow-lg"><h1 class="text-2xl font-extrabold mb-1">🏦 Canais de Negociação por Banco</h1><p class="text-white/80 text-sm">Lista atualizada com os canais certos para cada dívida</p><button onclick="window.print()" class="mt-4 bg-white text-copper-600 font-bold px-5 py-2 rounded-xl hover:bg-copper-50 transition text-sm">🖨️ Imprimir</button></div>

<div class="bg-dark-700 rounded-2xl p-6 border border-dark-600">
    <div class="bg-red-500/10 border-l-4 border-red-500 p-4 rounded-r-lg mb-6"><p class="font-bold text-red-400 text-sm">🚨 CUIDADO COM GOLPES</p><p class="text-red-400/70 text-xs">Nunca pague por "limpar nome". Negociar dívidas é GRÁTIS.</p></div>
    <div class="mb-6 no-print"><input type="text" id="busca" placeholder="🔍 Buscar banco ou plataforma..." oninput="filtrarBancos()" class="w-full px-4 py-3 bg-dark-800 border border-dark-600 rounded-xl text-sm text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-copper-500/30"></div>
    <div id="bancos-container" class="space-y-6"></div>
</div></div>

<script>
const secoes=[{titulo:'🏛️ Bancos Tradicionais',cor:'#C07B5E',bancos:[{nome:'Banco do Brasil',canal:'App BB > Menu > Renegociação',contato:'4004-0001',site:'https://bb.com.br'},{nome:'Caixa Econômica',canal:'App Caixa > Negociar Dívidas',contato:'4004-0104',site:'https://caixa.gov.br'},{nome:'Itaú',canal:'App Itaú > Soluções de Dívidas',contato:'4004-4828',site:'https://itau.com.br'},{nome:'Bradesco',canal:'App Bradesco > Acordos',contato:'0800-704-8383',site:'https://bradesco.com.br'},{nome:'Santander',canal:'App Santander > Negociação Online',contato:'4004-3535',site:'https://santander.com.br'}]},{titulo:'📱 Bancos Digitais',cor:'#D4A08B',bancos:[{nome:'Nubank',canal:'App Nubank > Chat > Negociar',contato:'0800-591-2117',site:'https://nubank.com.br'},{nome:'Inter',canal:'App Inter > Empréstimos > Negociar',contato:'3003-4070',site:'https://bancointer.com.br'},{nome:'C6 Bank',canal:'App C6 > Atendimento',contato:'3003-6116',site:'https://c6bank.com.br'},{nome:'PicPay',canal:'App PicPay > Carteira > Dívidas',contato:'0800-025-8000',site:'https://picpay.com'},{nome:'Mercado Pago',canal:'App MP > Crédito > Negociar',contato:'0800-878-3334',site:'https://mercadopago.com.br'},{nome:'Next',canal:'App Next > Ajuda',contato:'0800-275-6398',site:'https://next.b.br'},{nome:'Digio',canal:'App Digio > Chat',contato:'0800-725-3444',site:'https://digio.com.br'},{nome:'PagBank',canal:'App PagBank > Empréstimo',contato:'4003-1775',site:'https://pagbank.com.br'}]},{titulo:'🏪 Varejistas / Cartões de Loja',cor:'#8B6E2E',bancos:[{nome:'Casas Bahia / Bradescard',canal:'App Bradescard > Negociação',contato:'0800-727-9966',site:'https://casasbahia.com.br'},{nome:'Magazine Luiza / Luizacred',canal:'App Magalu > Cartão',contato:'0800-773-3838',site:'https://magazineluiza.com.br'},{nome:'Carrefour / Atacadão',canal:'App Carrefour > Cartão',contato:'3004-4055',site:'https://carrefour.com.br'},{nome:'Renner / Realize',canal:'App Realize > Contrato',contato:'3004-5065',site:'https://lojasrenner.com.br'},{nome:'C&A Pay',canal:'App C&A Pay > Ajuda',contato:'0800-701-2020',site:'https://cea.com.br'}]},{titulo:'🔍 Plataformas Multibanco',cor:'#6E3A2A',bancos:[{nome:'Serasa Limpa Nome',canal:'Site serasa.com.br/limpa-nome ou App',contato:'0800-591-1223',site:'https://serasa.com.br/limpa-nome'},{nome:'Feirão Limpa Nome',canal:'Site feiraolimpanome.com.br',contato:'',site:'https://feiraolimpanome.com.br'},{nome:'Registrato (Banco Central)',canal:'Site bcb.gov.br > Registrato',contato:'',site:'https://bcb.gov.br/cidadaniafinanceira/registrato'},{nome:'Consumidor.gov.br',canal:'Reclamação formal. Resolução em 7 dias.',contato:'',site:'https://consumidor.gov.br'},{nome:'Procon',canal:'Site Procon estadual > Reclamação',contato:'151',site:'https://procon.sp.gov.br'}]}];

const container=document.getElementById('bancos-container');
function renderizar(filtro){filtro=(filtro||'').toLowerCase();let h='';secoes.forEach(s=>{const v=s.bancos.filter(b=>b.nome.toLowerCase().includes(filtro)||b.canal.toLowerCase().includes(filtro));if(!v.length)return;h+=`<div><h2 class="text-base font-extrabold text-white mb-3 flex items-center gap-2"><span class="w-3 h-3 rounded-full" style="background:${s.cor}"></span>${s.titulo}</h2><div class="space-y-2">`;v.forEach(b=>{h+=`<div class="border border-dark-500 rounded-xl p-4 hover:border-copper-500/30 transition bg-dark-800"><div class="flex justify-between items-start"><div><p class="font-bold text-white text-sm">${b.nome}</p><p class="text-xs text-gray-400 mt-0.5">${b.canal}</p></div></div><div class="flex gap-2 mt-3 flex-wrap">${b.contato?`<a href="tel:${b.contato.replace(/\D/g,'')}" class="text-xs font-bold text-copper-400 hover:text-copper-300 bg-copper-500/10 hover:bg-copper-500/20 px-3 py-1.5 rounded-lg transition">📞 ${b.contato}</a>`:''}${b.site?`<a href="${b.site}" target="_blank" rel="noopener" class="text-xs font-bold text-gray-400 hover:text-gray-300 bg-dark-600 hover:bg-dark-500 px-3 py-1.5 rounded-lg transition">🌐 Acessar site</a>`:''}</div></div>`});h+='</div></div>'});if(!h)h='<p class="text-center text-gray-400 py-8">Nenhum banco encontrado.</p>';container.innerHTML=h}
function filtrarBancos(){renderizar(document.getElementById('busca').value)}
renderizar();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>30 Gastos para Cortar | Saia do Vermelho</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <script>tailwind.config={theme:{extend:{colors:{copper:{50:'#FDF8F5',100:'#F5E6DE',200:'#E8C4B4',300:'#D4A08B',400:'#C07B5E',500:'#A8634A',600:'#8B4E3A',700:'#6E3A2A',800:'#4E261A',900:'#2E140D'},dark:{800:'#0D0D0D',700:'#141414',600:'#1A1A1A',500:'#333333',400:'#666666'}},fontFamily:{sans:['Inter','system-ui','sans-serif']}}}}</script>
    <style>.copper-gradient{background:linear-gradient(135deg,#C07B5E,#D4A08B,#C07B5E)}@media print{body{background:#0D0D0D!important}.no-print{display:none!important}}</style>
</head>
<body class="bg-dark-800 text-gray-300 font-sans antialiased">
<div class="max-w-2xl mx-auto p-4">
<div class="copper-gradient text-white rounded-2xl p-6 mb-6 text-center no-print shadow-lg"><h1 class="text-2xl font-extrabold mb-1">✂️ 30 Gastos que Dá para Cortar</h1><p class="text-white/80 text-sm">Economia de até R$ 400/mês sem deixar de viver</p><button onclick="window.print()" class="mt-4 bg-white text-copper-600 font-bold px-5 py-2 rounded-xl hover:bg-copper-50 transition text-sm">🖨️ Imprimir</button></div>

<div class="bg-dark-700 rounded-2xl p-6 border border-dark-600">
    <div class="bg-copper-500/10 rounded-2xl p-5 mb-8 border border-copper-500/20 no-print"><h2 class="text-lg font-extrabold text-white mb-4">💰 Sua Economia Potencial</h2><p class="text-sm text-gray-400 mb-3">Marque os cortes que você vai aplicar:</p><div class="text-center"><p class="text-xs text-gray-400">Economia estimada</p><p id="economia-total" class="text-4xl font-extrabold text-copper-400">R$ 0</p><p class="text-xs text-gray-500">por mês</p><div class="h-2 bg-dark-500 rounded-full mt-3 overflow-hidden max-w-xs mx-auto"><div id="barra-economia" class="h-full copper-gradient rounded-full transition-all duration-300" style="width:0%"></div></div><p class="text-xs text-gray-500 mt-1">Meta: R$ 400/mês</p></div></div>

    <div class="mb-8"><h2 class="text-lg font-extrabold text-white mb-4">📊 Gastos Antes vs Depois</h2><canvas id="chartCortes" height="300"></canvas></div>
    <div id="cortes-container"></div>
</div></div>

<script>
const cortes=[{nivel:1,icone:'📺',titulo:'1. Assinaturas não usadas',desc:'Netflix, Disney+, HBO. Fique só com 1.',economia:'20-50',valor:35},{nivel:1,icone:'📱',titulo:'2. Apps pagos esquecidos',desc:'Revise Play Store e App Store agora.',economia:'5-30',valor:15},{nivel:1,icone:'🏋️',titulo:'3. Academia que não vai',desc:'Foi menos de 4x no mês? Cancele.',economia:'70-120',valor:90},{nivel:1,icone:'📱',titulo:'4. Seguro de celular',desc:'Franquia às vezes maior que o aparelho.',economia:'15-30',valor:20},{nivel:1,icone:'🏦',titulo:'5. Tarifa bancária',desc:'Migre para conta digital gratuita.',economia:'15-40',valor:25},{nivel:1,icone:'🎁',titulo:'6. Embalagens de presente',desc:'Use jornal, revista, tecido.',economia:'5-15',valor:10},{nivel:1,icone:'🎮',titulo:'7. Jogos e créditos',desc:'Jogos grátis e Wi-Fi.',economia:'10-30',valor:20},{nivel:1,icone:'📰',titulo:'8. Revistas e jornais',desc:'Tudo na internet, de graça.',economia:'10-25',valor:15},{nivel:1,icone:'🅿️',titulo:'9. Estacionamento',desc:'Ande 2 quadras. Use transporte público.',economia:'30-80',valor:50},{nivel:1,icone:'🚶',titulo:'10. Transporte curto',desc:'Até 2km: vá a pé ou de bike.',economia:'15-40',valor:25},{nivel:1,icone:'🍫',titulo:'11. Compra na fila',desc:'Chocolate, chiclete. Respire e passe reto.',economia:'10-30',valor:20},{nivel:1,icone:'🗑️',titulo:'12. Desperdício de comida',desc:'Planeje refeições. Cozinhe e congele.',economia:'30-60',valor:45},{nivel:2,icone:'📡',titulo:'13. TV a cabo → Streaming',desc:'Troque pacote completo por 1 streaming.',economia:'50-100',valor:70},{nivel:2,icone:'🍳',titulo:'14. Delivery → Cozinhar',desc:'R$ 30 vira R$ 8 de ingredientes.',economia:'60-200',valor:120},{nivel:2,icone:'💧',titulo:'15. Água mineral → Filtro',desc:'Filtro de barro: R$ 60 por 2 anos.',economia:'25-40',valor:30},{nivel:2,icone:'☕',titulo:'16. Café na rua → em casa',desc:'Café em casa: R$ 0,50. Padaria: R$ 5.',economia:'90',valor:90},{nivel:2,icone:'🏷️',titulo:'17. Marca cara → própria',desc:'Mesma fábrica, metade do preço.',economia:'30-60',valor:45},{nivel:2,icone:'🚬',titulo:'18. Cigarro → redução',desc:'1 maço/dia = R$ 180/mês. Reduza 50%.',economia:'90',valor:90},{nivel:2,icone:'💇',titulo:'19. Salão semanal → quinzenal',desc:'Espaçar de 4 para 2 vezes por mês.',economia:'30-60',valor:45},{nivel:2,icone:'🚗',titulo:'20. Uber → Transporte público',desc:'Bilhete Único: R$ 120/mês.',economia:'100-180',valor:140},{nivel:3,icone:'💡',titulo:'21. Luz acesa sem necessidade',desc:'Apague ao sair. Troque por LED.',economia:'15-30',valor:20},{nivel:3,icone:'📱',titulo:'22. Plano celular caro',desc:'Pré-pago ou controle. Wi-Fi resolve 80%.',economia:'20-50',valor:35},{nivel:3,icone:'🍺',titulo:'23. Fim de semana no bar',desc:'Churrasco em casa com amigos.',economia:'40-100',valor:70},{nivel:3,icone:'👗',titulo:'24. Roupa nova todo mês',desc:'Brechós e trocas economizam 70%.',economia:'30-80',valor:50},{nivel:3,icone:'💄',titulo:'25. Cosméticos caros',desc:'Marcas nacionais = metade do preço.',economia:'20-60',valor:40},{nivel:3,icone:'🎬',titulo:'26. Cinema + pipoca',desc:'Noite em casa com streaming = R$ 0.',economia:'40-80',valor:60},{nivel:3,icone:'📦',titulo:'27. Parcelas com juros',desc:'Sem juros OK. Com juros, JAMAIS.',economia:'30-100',valor:60},{nivel:3,icone:'🍕',titulo:'28. Ifood todo fim de semana',desc:'Reduza para 1x por mês.',economia:'60-150',valor:100},{nivel:3,icone:'🔧',titulo:'29. Consertos adiados',desc:'Torneira pingando = R$ 30/mês.',economia:'20-80',valor:40},{nivel:3,icone:'📊',titulo:'30. Falta de planejamento',desc:'10 min no domingo = R$ 200+ de economia.',economia:'50-200',valor:100}];

const container=document.getElementById('cortes-container');let nivelAtual=0;
cortes.forEach(c=>{if(c.nivel!==nivelAtual){nivelAtual=c.nivel;const labels={1:['🟢 NÍVEL 1 — CORTES INDOLORES','Você nem sente falta'],2:['🟡 NÍVEL 2 — TROCAS INTELIGENTES','Substitui por algo mais barato'],3:['🟠 NÍVEL 3 — CORTES CONSCIENTES','Exige esforço, grande economia']};container.innerHTML+=`<div class="mb-6"><h2 class="text-base font-extrabold text-white mb-1">${labels[c.nivel][0]}</h2><p class="text-xs text-gray-400 mb-3">${labels[c.nivel][1]}</p><div class="space-y-2" id="nivel-${c.nivel}"></div></div>`}document.getElementById('nivel-'+c.nivel).innerHTML+=`<div class="flex items-start gap-3 p-3 rounded-xl hover:bg-dark-600 cursor-pointer transition" onclick="toggleCorte(this,${c.valor})"><input type="checkbox" id="corte-${cortes.indexOf(c)}" onchange="atualizarEconomia()" class="mt-1 w-4 h-4 text-copper-400 rounded focus:ring-copper-500/30 flex-shrink-0"><div class="flex-1"><span class="text-2xl mr-2 align-middle">${c.icone}</span><span class="font-semibold text-sm text-white">${c.titulo}</span><p class="text-xs text-gray-400 mt-0.5">${c.desc}</p><p class="text-xs text-copper-400 font-bold mt-1">Economia: R$ ${c.economia}/mês</p></div></div>`});

function toggleCorte(el,valor){el.querySelector('input').checked=!el.querySelector('input').checked;atualizarEconomia()}
function atualizarEconomia(){let total=0;document.querySelectorAll('#cortes-container input:checked').forEach(cb=>{total+=cortes[parseInt(cb.id.replace('corte-',''))].valor});document.getElementById('economia-total').textContent='R$ '+total;document.getElementById('barra-economia').style.width=Math.min(100,(total/400)*100)+'%';const state={};document.querySelectorAll('#cortes-container input').forEach(cb=>state[cb.id]=cb.checked);localStorage.setItem('cortes_checklist',JSON.stringify(state))}
(function(){const s=JSON.parse(localStorage.getItem('cortes_checklist')||'{}');Object.entries(s).forEach(([id,checked])=>{const cb=document.getElementById(id);if(cb&&checked)cb.checked=true});atualizarEconomia()})();

new Chart(document.getElementById('chartCortes'),{type:'bar',data:{labels:['Assinaturas','Academia','Delivery','Café fora','Uber','Marcas caras','Celular','Bar','Roupas','Cinema'],datasets:[{label:'Antes (R$/mês)',data:[80,100,200,90,150,200,80,150,100,80],backgroundColor:'#EF4444',borderRadius:6},{label:'Depois (R$/mês)',data:[20,0,40,10,30,80,30,50,20,0],backgroundColor:'#C07B5E',borderRadius:6}]},options:{responsive:true,plugins:{legend:{position:'bottom',labels:{font:{family:'Inter',size:11},padding:14,color:'#999',usePointStyle:true}}},scales:{y:{ticks:{callback:v=>'R$ '+v,font:{family:'Inter'},color:'#999'},grid:{color:'#333'}},x:{ticks:{font:{family:'Inter',size:10},color:'#999'}}}}});
</script>
</body>
</html>
